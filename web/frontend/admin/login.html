<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Administrador - Mercashop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
  <link href="../css/admin.css" rel="stylesheet">
  <link href="../css/responsive.css" rel="stylesheet">
</head>
<body class="admin-shell">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
  <div class="card admin-card shadow-sm" style="max-width:420px;width:100%;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <span class="admin-badge mb-3 d-inline-flex"><i class="bi bi-shield-lock"></i> Acceso seguro</span>
        <h4 class="admin-title mb-1">Panel Administrador</h4>
        <p class="admin-subtitle mb-0">Inicia sesión para administrar la tienda.</p>
      </div>

      <div id="alerta" class="alert alert-danger d-none"></div>

      <form id="loginForm" class="admin-form">
        <div class="mb-3">
          <label for="correo" class="form-label">Correo</label>
          <input type="email" class="form-control" id="correo" name="correo" placeholder="admin@mercashop.com" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="********" required>
        </div>
        <button type="submit" class="btn btn-dark w-100 admin-btn-primary">Ingresar</button>
      </form>
    </div>
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const alerta = document.getElementById('alerta');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  alerta.classList.add('d-none');

  const formData = new FormData(form);

  try {
    const resp = await fetch('/api/admin_login.php', { method: 'POST', body: formData });
    const data = await resp.json();

    if (data.OK) {
      window.location.href = 'index.html';
    } else {
      alerta.textContent = data.error || 'Credenciales inválidas';
      alerta.classList.remove('d-none');
    }
  } catch {
    alerta.textContent = 'Error de conexión con el servidor';
    alerta.classList.remove('d-none');
  }
});
</script>
</body>
</html>
