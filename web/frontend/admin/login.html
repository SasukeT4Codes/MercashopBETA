<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Administrador - Mercashop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="max-width: 400px; width: 100%;">
      <div class="card-body">
        <h4 class="card-title text-center mb-4">Panel Administrador</h4>

        <div id="alerta" class="alert alert-danger d-none"></div>

        <form id="loginForm">
          <div class="mb-3">
            <label for="correo" class="form-label">Correo</label>
            <input type="email" class="form-control" id="correo" name="correo" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const alerta = document.getElementById('alerta');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alerta.classList.add('d-none');

      const formData = new FormData(form);

      try {
        const resp = await fetch('/api/admin_login.php', {
          method: 'POST',
          body: formData
        });
        const data = await resp.json();

        if (data.OK) {
          window.location.href = 'index.html';
        } else {
          alerta.textContent = data.error || 'Credenciales inválidas';
          alerta.classList.remove('d-none');
        }
      } catch (err) {
        alerta.textContent = 'Error de conexión con el servidor';
        alerta.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
