<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Registro de Compras</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
  <link href="../css/admin.css" rel="stylesheet">
  <link href="../css/responsive.css" rel="stylesheet">
</head>
<body class="admin-shell">

<nav class="navbar navbar-expand-lg admin-navbar">
  <div class="container-fluid">
    <a class="navbar-brand ms-brand" href="index.html">Panel Administrador</a>
    <div class="d-flex gap-2">
      <a href="tiendas.html" class="btn btn-outline-light btn-sm">Tiendas</a>
      <a href="productos.html" class="btn btn-outline-light btn-sm">Productos</a>
      <a href="index.html" class="btn btn-outline-light btn-sm">Dashboard</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="admin-panel">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
      <div>
        <h1 class="admin-title mb-1">Registro de Compras</h1>
        <p class="admin-subtitle mb-0">Selecciona una tienda o ver todas las compras.</p>
      </div>
      <span class="admin-badge"><i class="bi bi-receipt"></i> Compras</span>
    </div>

    <div class="admin-card p-3 mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label for="tiendaSelect" class="form-label fw-500">Tienda</label>
          <select id="tiendaSelect" class="form-select">
            <option value="">Todas las tiendas</option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="ordenSelect" class="form-label fw-500">Ordenar por</label>
          <select id="ordenSelect" class="form-select">
            <option value="fecha">Fecha</option>
            <option value="total">Total</option>
            <option value="cliente">Cliente</option>
          </select>
        </div>
      </div>
    </div>

    <div class="table-responsive admin-table-wrap">
      <table class="table admin-table table-hover align-middle" id="tablaCompras">
        <thead>
          <tr>
            <th>ID Pedido</th>
            <th>ID Cliente</th>
            <th>Cliente</th>
            <th>Subtotal</th>
            <th>Total</th>
            <th>Estado</th>
            <th>Fecha</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="7" class="text-center admin-muted py-4">Cargando compras...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3">
      <button class="btn btn-outline-dark" id="btn-prev">Anterior</button>
      <span id="page-info">Página 1</span>
      <button class="btn btn-outline-dark" id="btn-next">Siguiente</button>
    </div>
  </div>
</div>

<script src="compras.js"></script>
</body>
</html>
