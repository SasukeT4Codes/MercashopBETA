<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Registro de Compras por Tienda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Panel Administrador</a>
      <div>
        <a href="productos.html" class="btn btn-outline-light me-2">Gestión de Productos</a>
        <a href="tiendas.html" class="btn btn-outline-light me-2">Gestión de Tiendas</a>
        <a href="index.html" class="btn btn-outline-light">Volver al Dashboard</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h1 class="mb-3">Registro de Compras por Tienda</h1>

    <div class="mb-3 row">
      <label class="col-sm-2 col-form-label" for="tiendaSelect">Tienda</label>
      <div class="col-sm-6">
        <select id="tiendaSelect" class="form-select">
          <option value="">Seleccione una tienda...</option>
        </select>
      </div>
    </div>

    <hr>

    <table class="table table-striped" id="tablaCompras">
      <thead>
        <tr>
          <th>ID Pedido</th>
          <th>ID Cliente</th>
          <th>Cliente</th>
          <th>Subtotal</th>
          <th>Total</th>
          <th>Estado</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="7">Seleccione una tienda.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script src="compras.js"></script>
</body>
</html>
