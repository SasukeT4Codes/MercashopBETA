<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Registro de Compras</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Panel Administrador</a>
      <div>
        <a href="productos.html" class="btn btn-outline-light me-2">Gestión de Productos</a>
        <a href="tiendas.html" class="btn btn-outline-light me-2">Gestión de Tiendas</a>
        <a href="index.html" class="btn btn-outline-light">Volver al Dashboard</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h1 class="mb-3">Registro de Compras</h1>

    <div class="row mb-3">
      <div class="col-sm-4">
        <label for="tiendaSelect" class="form-label">Tienda</label>
        <select id="tiendaSelect" class="form-select">
          <option value="">Todas las tiendas</option>
        </select>
      </div>
      <div class="col-sm-4">
        <label for="ordenSelect" class="form-label">Ordenar por</label>
        <select id="ordenSelect" class="form-select">
          <option value="fecha">Fecha</option>
          <option value="total">Total</option>
          <option value="cliente">Cliente</option>
        </select>
      </div>
    </div>

    <hr>

    <table class="table table-striped" id="tablaCompras">
      <thead>
        <tr>
          <th>ID Pedido</th>
          <th>ID Cliente</th>
          <th>Cliente</th>
          <th>Subtotal</th>
          <th>Total</th>
          <th>Estado</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="7">Cargando compras...</td>
        </tr>
      </tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center mt-3">
      <button class="btn btn-outline-dark" id="btn-prev">Anterior</button>
      <span id="page-info">Página 1</span>
      <button class="btn btn-outline-dark" id="btn-next">Siguiente</button>
    </div>
  </div>

  <script src="compras.js"></script>
</body>
</html>
