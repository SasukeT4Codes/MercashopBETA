<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-4">
    <h1>Gestión de Productos</h1>

    <!-- Formulario -->
    <form id="formProducto" class="mb-4">
      <div class="row">
        <div class="col-md-4">
          <input type="text" name="cDescripcionCorta" class="form-control" placeholder="Nombre corto" required>
        </div>
        <div class="col-md-4">
          <input type="text" name="cDescripcionLarga" class="form-control" placeholder="Descripción larga">
        </div>
        <div class="col-md-2">
          <input type="number" name="nPrecioUnitario" class="form-control" placeholder="Precio" required>
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-success w-100">Agregar</button>
        </div>
      </div>
    </form>

    <!-- Tabla -->
    <table class="table table-striped" id="tablaProductos">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="productos.js"></script>
</body>
</html>
