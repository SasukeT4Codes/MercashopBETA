<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Tiendas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
  <link href="../css/admin.css" rel="stylesheet">
  <link href="../css/responsive.css" rel="stylesheet">
</head>
<body class="admin-shell">
<nav class="navbar navbar-expand-lg admin-navbar">
  <div class="container-fluid">
    <a class="navbar-brand ms-brand" href="index.html">Panel Administrador</a>
    <div class="d-flex gap-2">
      <a href="productos.html" class="btn btn-outline-light btn-sm">Productos</a>
      <a href="index.html" class="btn btn-outline-light btn-sm">Dashboard</a>
    </div>
  </div>
</nav>
<div class="container py-4">
  <div class="admin-panel">
    <h1 class="admin-title mb-4">Gestión de Tiendas</h1>
    <form id="formTienda" class="admin-form mb-4">
      <div class="row g-3">
        <div class="col-md-4">
          <input type="text" name="cNombreComercial" class="form-control" placeholder="Nombre comercial" required>
        </div>
        <div class="col-md-4">
          <input type="text" name="tDescripcion" class="form-control" placeholder="Descripción">
        </div>
        <div class="col-md-4">
          <input type="email" name="cCorreoAtencion" class="form-control" placeholder="Correo atención" required>
        </div>
        <div class="col-md-4">
          <input type="text" name="cTelefonoAtencion" class="form-control" placeholder="Teléfono">
        </div>
        <div class="col-md-4">
          <input type="text" name="cRazonSocial" class="form-control" placeholder="Razón social">
        </div>
        <div class="col-md-4 d-grid">
          <button type="submit" class="btn btn-dark admin-btn-primary">Agregar Tienda</button>
        </div>
      </div>
    </form>
    <div class="table-responsive admin-table-wrap">
      <table class="table admin-table table-striped" id="tablaTiendas">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>
<script src="tiendas.js"></script>
</body>
</html>
