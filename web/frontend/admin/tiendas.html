<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Tiendas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Panel Administrador</a>
      <div>
        <a href="productos.html" class="btn btn-outline-light me-2">Gestión de Productos</a>
        <a href="index.html" class="btn btn-outline-light">Volver al Dashboard</a>
      </div>
    </div>
  </nav>
  <div class="container mt-4">
    <h1>Gestión de Tiendas</h1>

    <!-- Formulario -->
    <form id="formTienda" class="mb-4">
      <div class="row">
        <div class="col-md-4">
          <input type="text" name="cNombreComercial" class="form-control" placeholder="Nombre comercial" required>
        </div>
        <div class="col-md-4">
          <input type="text" name="tDescripcion" class="form-control" placeholder="Descripción">
        </div>
        <div class="col-md-4">
          <input type="email" name="cCorreoAtencion" class="form-control" placeholder="Correo atención" required>
        </div>
      </div>
      <div class="row mt-2">
        <div class="col-md-4">
          <input type="text" name="cTelefonoAtencion" class="form-control" placeholder="Teléfono">
        </div>
        <div class="col-md-4">
          <input type="text" name="cRazonSocial" class="form-control" placeholder="Razón social">
        </div>
        <div class="col-md-4">
          <button type="submit" class="btn btn-success w-100">Agregar Tienda</button>
        </div>
      </div>
    </form>

    <!-- Tabla -->
    <table class="table table-striped" id="tablaTiendas">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="tiendas.js"></script>
</body>
</html>
