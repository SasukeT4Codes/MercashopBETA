<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MercaShop – Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body class="ms-login-body">

<nav class="navbar ms-navbar">
  <div class="container">
    <a class="navbar-brand ms-brand" href="index.html">MercaShop</a>
  </div>
</nav>

<main class="d-flex align-items-center justify-content-center" style="min-height:calc(100vh - 66px)">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-9 col-md-7 col-lg-5 col-xl-4">

        <div class="card border-0 shadow-sm p-4 p-md-5">
          <div class="text-center mb-4">
            <p class="ms-brand fs-4 mb-1">MercaShop</p>
            <h2 class="ms-title fs-3 mb-1">Bienvenido</h2>
            <p class="text-muted small">Inicia sesión para continuar</p>
          </div>

          <!-- TABS -->
          <ul class="nav nav-pills nav-fill mb-4 ms-tabs" id="auth-tabs">
            <li class="nav-item">
              <button class="nav-link active" data-tab="login">Iniciar sesión</button>
            </li>
            <li class="nav-item">
              <button class="nav-link" data-tab="registro">Registrarse</button>
            </li>
          </ul>

          <!-- LOGIN -->
          <div id="form-login">
            <div class="mb-3">
              <label class="form-label small fw-500">Correo electrónico</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-envelope text-muted"></i></span>
                <input type="email" id="login-email" class="form-control border-start-0 ps-0" placeholder="tu@correo.com"/>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-500">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" id="login-pass" class="form-control border-start-0 ps-0" placeholder="••••••••"/>
                <button class="btn btn-outline-secondary" type="button" id="toggle-pass">
                  <i class="bi bi-eye" id="pass-icon"></i>
                </button>
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="remember-me"/>
                <label class="form-check-label small" for="remember-me">Recuérdame</label>
              </div>
              <a href="#" class="small text-dark">¿Olvidaste tu contraseña?</a>
            </div>
            <div id="login-error" class="alert alert-danger small d-none"></div>
            <div class="d-grid mb-3">
              <button class="btn btn-dark btn-lg" id="btn-login">
                <span id="login-text">Iniciar sesión</span>
                <span id="login-spinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
              </button>
            </div>
            <p class="text-center small text-muted mb-0">
              ¿No tienes cuenta? <a href="#" class="text-dark" id="link-a-registro">Regístrate</a>
            </p>
          </div>

          <!-- REGISTRO -->
          <div id="form-registro" class="d-none">
            <div class="row g-2 mb-3">
              <div class="col">
                <label class="form-label small fw-500">Nombre</label>
                <input type="text" id="reg-nombre" class="form-control" placeholder="María"/>
              </div>
              <div class="col">
                <label class="form-label small fw-500">Apellido</label>
                <input type="text" id="reg-apellido" class="form-control" placeholder="García"/>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-500">Correo electrónico</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-envelope text-muted"></i></span>
                <input type="email" id="reg-email" class="form-control border-start-0 ps-0" placeholder="tu@correo.com"/>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-500">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" id="reg-pass" class="form-control border-start-0 ps-0" placeholder="Mínimo 8 caracteres"/>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label small fw-500">Confirmar contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock-fill text-muted"></i></span>
                <input type="password" id="reg-pass2" class="form-control border-start-0 ps-0" placeholder="Repite tu contraseña"/>
              </div>
            </div>
            <div id="reg-error"   class="alert alert-danger  small d-none"></div>
            <div id="reg-success" class="alert alert-success small d-none"></div>
            <div class="d-grid mb-3">
              <button class="btn btn-dark btn-lg" id="btn-registro">
                <span id="reg-text">Crear cuenta</span>
                <span id="reg-spinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
              </button>
            </div>
            <p class="text-center small text-muted mb-0">
              ¿Ya tienes cuenta? <a href="#" class="text-dark" id="link-a-login">Inicia sesión</a>
            </p>
          </div>
        </div>

        <div class="text-center mt-4">
          <p class="text-muted small mb-3">— o continúa con —</p>
          <div class="d-flex justify-content-center gap-3">
            <button class="btn btn-outline-secondary rounded-circle" style="width:44px;height:44px" title="Google">
              <i class="bi bi-google"></i>
            </button>
            <button class="btn btn-outline-secondary rounded-circle" style="width:44px;height:44px" title="Facebook">
              <i class="bi bi-facebook"></i>
            </button>
            <button class="btn btn-outline-secondary rounded-circle" style="width:44px;height:44px" title="Apple">
              <i class="bi bi-apple"></i>
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const AUTH_API = '../backend/auth.php';

document.querySelectorAll('#auth-tabs .nav-link').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#auth-tabs .nav-link').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('form-login').classList.toggle('d-none',    tab !== 'login');
    document.getElementById('form-registro').classList.toggle('d-none', tab !== 'registro');
  });
});

document.getElementById('link-a-registro').addEventListener('click', e => { e.preventDefault(); document.querySelector('[data-tab="registro"]').click(); });
document.getElementById('link-a-login').addEventListener('click',    e => { e.preventDefault(); document.querySelector('[data-tab="login"]').click(); });

document.getElementById('toggle-pass').addEventListener('click', () => {
  const input = document.getElementById('login-pass');
  const icon  = document.getElementById('pass-icon');
  input.type  = input.type === 'password' ? 'text' : 'password';
  icon.classList.toggle('bi-eye'); icon.classList.toggle('bi-eye-slash');
});

document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('d-none');
  if (!email || !pass) { mostrarError(errEl, 'Completa todos los campos'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { mostrarError(errEl, 'Correo no válido'); return; }
  setLoading('login', true);
  try {
    const resp = await fetch(AUTH_API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ accion:'login', email, password:pass }) });
    const data = await resp.json();
    if (data.ok || data.success) { localStorage.setItem('ms_user', JSON.stringify(data.usuario || { email })); window.location.href = 'index.html'; }
    else mostrarError(errEl, data.mensaje || 'Credenciales incorrectas');
  } catch {
    if (pass.length >= 4) { localStorage.setItem('ms_user', JSON.stringify({ email, nombre:'Usuario Demo' })); window.location.href = 'index.html'; }
    else mostrarError(errEl, 'Credenciales incorrectas');
  } finally { setLoading('login', false); }
});

document.getElementById('btn-registro').addEventListener('click', async () => {
  const nombre = document.getElementById('reg-nombre').value.trim();
  const email  = document.getElementById('reg-email').value.trim();
  const pass   = document.getElementById('reg-pass').value;
  const pass2  = document.getElementById('reg-pass2').value;
  const errEl  = document.getElementById('reg-error');
  const okEl   = document.getElementById('reg-success');
  errEl.classList.add('d-none'); okEl.classList.add('d-none');
  if (!nombre || !email || !pass || !pass2) { mostrarError(errEl, 'Completa todos los campos'); return; }
  if (pass.length < 8)  { mostrarError(errEl, 'La contraseña debe tener al menos 8 caracteres'); return; }
  if (pass !== pass2)   { mostrarError(errEl, 'Las contraseñas no coinciden'); return; }
  setLoading('reg', true);
  try {
    const resp = await fetch(AUTH_API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ accion:'registro', nombre, email, password:pass }) });
    const data = await resp.json();
    if (data.ok || data.success) { okEl.textContent = '¡Cuenta creada! Ahora puedes iniciar sesión.'; okEl.classList.remove('d-none'); setTimeout(() => document.querySelector('[data-tab="login"]').click(), 2000); }
    else mostrarError(errEl, data.mensaje || 'Error al crear la cuenta');
  } catch {
    okEl.textContent = '¡Cuenta creada exitosamente! (modo demo)';
    okEl.classList.remove('d-none');
    setTimeout(() => document.querySelector('[data-tab="login"]').click(), 2000);
  } finally { setLoading('reg', false); }
});

function mostrarError(el, msg) { el.textContent = msg; el.classList.remove('d-none'); }
function setLoading(form, on) {
  document.getElementById(`${form === 'login' ? 'login' : 'reg'}-spinner`).classList.toggle('d-none', !on);
  document.getElementById(`${form === 'login' ? 'login' : 'reg'}-text`).textContent = on ? (form === 'login' ? 'Iniciando...' : 'Creando cuenta...') : (form === 'login' ? 'Iniciar sesión' : 'Crear cuenta');
}
</script>
</body>
</html>
