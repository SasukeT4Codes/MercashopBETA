<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MercaShop – Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body class="ms-login-body">

<div id="navbar"></div>

<main class="d-flex align-items-center justify-content-center" style="min-height:calc(100vh - 66px)">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-9 col-md-7 col-lg-5 col-xl-4">
        <div class="card border-0 shadow-sm p-4 p-md-5">
          <div class="text-center mb-4">
            <p class="ms-brand fs-4 mb-1">MercaShop</p>
            <h2 class="ms-title fs-3 mb-1">Bienvenido</h2>
            <p class="text-muted small">Inicia sesión para continuar</p>
          </div>

          <!-- TABS -->
          <ul class="nav nav-pills nav-fill mb-4 ms-tabs" id="auth-tabs">
            <li class="nav-item"><button class="nav-link active" data-tab="login">Iniciar sesión</button></li>
            <li class="nav-item"><button class="nav-link" data-tab="registro">Registrarse</button></li>
          </ul>

          <!-- LOGIN -->
          <div id="form-login">
            <div class="mb-3">
              <label class="form-label small fw-500">Correo electrónico</label>
              <input type="email" id="login-email" class="form-control" placeholder="tu@correo.com"/>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-500">Contraseña</label>
              <input type="password" id="login-pass" class="form-control" placeholder="••••••••"/>
            </div>
            <div id="login-error" class="alert alert-danger small d-none"></div>
            <div class="d-grid mb-3">
              <button class="btn btn-dark btn-lg" id="btn-login">Iniciar sesión</button>
            </div>
          </div>

          <!-- REGISTRO -->
          <div id="form-registro" class="d-none">
            <div class="mb-3"><label class="form-label small fw-500">Nombre</label><input type="text" id="reg-nombre" class="form-control"/></div>
            <div class="mb-3"><label class="form-label small fw-500">Apellido</label><input type="text" id="reg-apellido" class="form-control"/></div>
            <div class="mb-3"><label class="form-label small fw-500">Correo electrónico</label><input type="email" id="reg-email" class="form-control"/></div>
            <div class="mb-3"><label class="form-label small fw-500">Contraseña</label><input type="password" id="reg-pass" class="form-control"/></div>
            <div class="mb-3"><label class="form-label small fw-500">Confirmar contraseña</label><input type="password" id="reg-pass2" class="form-control"/></div>

            <!-- Departamento -->
            <div class="mb-3"><label class="form-label small fw-500">Departamento</label><select id="reg-departamento" class="form-select"></select></div>

            <!-- Municipio -->
            <div class="mb-3"><label class="form-label small fw-500">Municipio</label><select id="reg-municipio" class="form-select"></select></div>

            <!-- Dirección -->
            <div class="mb-3"><label class="form-label small fw-500">Dirección</label><input type="text" id="reg-nomenclatura" class="form-control" placeholder="Calle 10 # 20-30"/></div>
            <div class="mb-3"><label class="form-label small fw-500">Barrio</label><input type="text" id="reg-barrio" class="form-control"/></div>
            <div class="mb-3"><label class="form-label small fw-500">Código Postal</label><input type="text" id="reg-codpostal" class="form-control"/></div>

            <div id="reg-error" class="alert alert-danger small d-none"></div>
            <div id="reg-success" class="alert alert-success small d-none"></div>
            <div class="d-grid mb-3"><button class="btn btn-dark btn-lg" id="btn-registro">Crear cuenta</button></div>
          </div>


        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/navbar.js"></script>
<script src="js/login.js"></script>
</body>
</html>
