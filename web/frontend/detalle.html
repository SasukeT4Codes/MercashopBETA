<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MercaShop – Detalle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
  <link href="css/responsive.css" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-expand-lg ms-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand ms-brand" href="index.html">MercaShop</a>
    <button class="navbar-toggler border-0 ms-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <i class="bi bi-list text-white fs-4"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <div class="ms-auto d-flex align-items-center gap-3">
        <a href="login.html" class="nav-link text-white"><i class="bi bi-person"></i></a>
        <a href="carrito.html" class="nav-link text-white position-relative">
          <i class="bi bi-bag"></i>
          <span class="badge bg-warning text-dark position-absolute top-0 start-100 translate-middle rounded-pill" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </div>
</nav>

<main class="container py-5">
  <nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb small">
      <li class="breadcrumb-item"><a href="index.html" class="text-dark">Catálogo</a></li>
      <li class="breadcrumb-item active" id="bc-nombre">Producto</li>
    </ol>
  </nav>

  <div id="loading" class="text-center py-5">
    <div class="spinner-border text-secondary"></div>
    <p class="mt-3 text-muted small">Cargando producto...</p>
  </div>

  <div id="detalle-wrap" class="row g-5 d-none">
    <div class="col-md-6">
      <div class="ms-detalle-img-wrap rounded-3 overflow-hidden bg-light">
        <img id="det-imagen" src="" alt="" class="w-100 h-100 object-fit-cover"/>
      </div>
    </div>
    <div class="col-md-6 d-flex flex-column justify-content-start">
      <h1 id="det-nombre" class="ms-title fs-2 mb-2"></h1>
      <div class="d-flex align-items-center gap-3 mb-3">
        <span id="det-precio" class="fs-3 fw-semibold"></span>
      </div>
      <p id="det-descripcion" class="text-muted mb-4"></p>
      <div class="mb-4">
        <p class="fw-500 small mb-2">CANTIDAD</p>
        <div class="input-group" style="max-width:140px">
          <button class="btn btn-outline-dark" id="btn-menos">−</button>
          <input type="number" id="cantidad-input" class="form-control text-center border-dark" value="1" min="1" max="99"/>
          <button class="btn btn-outline-dark" id="btn-mas">+</button>
        </div>
      </div>
      <div class="d-grid gap-2">
        <button class="btn btn-dark btn-lg" id="btn-agregar">
          <i class="bi bi-bag-plus me-2"></i>AGREGAR AL CARRITO
        </button>
        <a href="carrito.html" class="btn btn-outline-dark btn-lg">
          <i class="bi bi-bag me-2"></i>VER CARRITO
        </a>
      </div>
      <p id="det-stock" class="text-muted small mt-3"></p>
    </div>
  </div>

  <div id="error-state" class="text-center py-5 d-none">
    <i class="bi bi-exclamation-circle display-1 text-muted"></i>
    <h5 class="mt-3">Producto no encontrado</h5>
    <a href="index.html" class="btn btn-dark mt-3">Volver al catálogo</a>
  </div>
</main>

<footer class="ms-footer py-4 mt-5">
  <div class="container text-center">
    <p class="ms-brand mb-1">MercaShop</p>
    <p class="text-muted small mb-0">© 2025 – Todos los derechos reservados</p>
  </div>
</footer>

<div class="position-fixed bottom-0 end-0 p-3" style="z-index:1100">
  <div id="toast-carrito" class="toast align-items-center text-bg-dark border-0">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg">Agregado al carrito</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/detalle.js"></script>
<script src="js/navbar.js"></script>
</body>
</html>
